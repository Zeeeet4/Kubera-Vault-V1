<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Kubera Vault - Gestión de finanzas personales offline">
    <meta name="theme-color" content="#2563EB">
    <title>Kubera Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/pages/accounts.css">
    <link rel="stylesheet" href="css/pages/debts.css">
    <link rel="stylesheet" href="css/pages/investments.css">
    <link rel="stylesheet" href="css/pages/cards.css">
    <link rel="stylesheet" href="css/pages/reports.css">
    <link rel="stylesheet" href="css/pages/settings.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app" class="flex flex-col min-h-screen">
        <header class="h-16 sticky top-0 z-50 flex items-center justify-between px-0 bg-[var(--glass-bg)] backdrop-blur-xl border-b border-[var(--glass-border)]" style="backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
            <div class="w-[15%] min-w-[120px]"></div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 font-semibold text-base text-[var(--accent-primary)] shrink-0">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9.5"/>
                        <path d="M12 5.5v13"/>
                        <path d="M15 8H10.5a2.5 2.5 0 0 0 0 5h3a2.5 2.5 0 0 1 0 5H9"/>
                    </svg>
                    <span class="hidden sm:inline">Kubera</span>
                </div>
                <div class="page-title text-lg font-semibold truncate" id="pageTitle">Dashboard</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex gap-1">
                    <button class="btn btn-ghost btn-sm view-btn" data-view="week">Semana</button>
                    <button class="btn btn-ghost btn-sm view-btn active" data-view="month">Mes</button>
                    <button class="btn btn-ghost btn-sm view-btn" data-view="year">Año</button>
                </div>
                <div class="flex items-center gap-1">
                    <button class="date-nav w-7 h-7 flex items-center justify-center rounded-md text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] transition-colors" id="prevPeriod">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <span class="period-label min-w-[140px] text-center text-sm font-medium" id="periodLabel"></span>
                    <button class="date-nav w-7 h-7 flex items-center justify-center rounded-md text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] transition-colors" id="nextPeriod">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button class="theme-toggle w-9 h-9 flex items-center justify-center rounded-md text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] transition-colors" id="themeToggle" title="Cambiar tema">
                    <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                </button>
                <button class="btn btn-secondary text-sm py-1.5 px-3" id="importBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <span class="hidden sm:inline">Importar</span>
                </button>
                <button class="btn btn-secondary text-sm py-1.5 px-3" id="exportBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    <span class="hidden sm:inline">Exportar</span>
                </button>
            </div>
            <div class="w-[15%] min-w-[120px]"></div>
        </header>

        <nav class="nav-bar sticky top-16 z-40 flex items-center justify-evenly overflow-x-auto bg-[var(--glass-bg)] backdrop-blur-xl border-b border-[var(--glass-border)] hide-scrollbar" style="backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
            <a href="#" class="nav-item active flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="dashboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="entries">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 7l-5-5-5 5"/></svg>
                <span>Entradas</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="expenses">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22V2M7 17l5 5 5-5"/></svg>
                <span>Salidas</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="accounts">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                <span>Cuentas</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="debts">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span>Deudas</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="cards">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20M6 16h4"/></svg>
                <span>Tarjetas</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="investments">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>
                <span>Inversiones</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="reports">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                <span>Reportes</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-1.5 px-3 py-2.5 rounded-lg text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition-colors shrink-0" data-page="settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Ajustes</span>
            </a>
        </nav>

        <div class="content-area flex-1" id="contentArea">
        </div>
    </div>

    <div class="pin-overlay" id="pinOverlay" style="display:none;">
        <div class="pin-dialog">
            <div class="pin-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h2 class="pin-title" id="pinOverlayTitle">Kubera Vault</h2>
            <p class="pin-subtitle" id="pinSubtitle">Ingresa tu PIN para desbloquear</p>
            <input type="password" class="pin-input" id="pinInput" placeholder="PIN" maxlength="6" inputmode="numeric" autocomplete="off">
            <p class="pin-error" id="pinError"></p>
            <button class="btn btn-ghost pin-btn pin-forgot" id="pinForgotBtn" style="display:none; font-size: var(--text-sm);">¿Olvidaste tu PIN?</button>
            <button class="btn btn-primary pin-btn" id="pinUnlockBtn">Desbloquear</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer" id="modalFooter">
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
